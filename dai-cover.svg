<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08080c"/>
      <stop offset="100%" stop-color="#030306"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b7aff"/>
      <stop offset="50%" stop-color="#c49bff"/>
      <stop offset="100%" stop-color="#5ed4d4"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b7aff"/>
      <stop offset="100%" stop-color="#ff64c8"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff64c8"/>
      <stop offset="100%" stop-color="#5ed4d4"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ed4d4"/>
      <stop offset="100%" stop-color="#9b7aff"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#9b7aff" stop-opacity=".3"/>
      <stop offset="50%" stop-color="#c49bff" stop-opacity=".5"/>
      <stop offset="70%" stop-color="#5ed4d4" stop-opacity=".3"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b7aff" stop-opacity=".8"/>
      <stop offset="40%" stop-color="#9b7aff" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#9b7aff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b7aff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#9b7aff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ed4d4" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#5ed4d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff64c8" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#ff64c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="tinyGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- ══ AMBIENT GLOWS ══ -->
  <ellipse cx="800" cy="360" rx="600" ry="400" fill="url(#ambientGlow1)"/>
  <ellipse cx="580" cy="500" rx="400" ry="300" fill="url(#ambientGlow3)"/>
  <ellipse cx="1020" cy="400" rx="400" ry="300" fill="url(#ambientGlow2)"/>

  <!-- ══ PARTICLE FIELD ══ -->
  <g id="particles" opacity=".5">
    <!-- Purple particles -->
    <circle cx="180" cy="120" r="1.2" fill="#9b7aff" opacity=".5"/>
    <circle cx="320" cy="280" r=".8" fill="#9b7aff" opacity=".35"/>
    <circle cx="1350" cy="180" r="1" fill="#9b7aff" opacity=".4"/>
    <circle cx="1100" cy="720" r="1.3" fill="#9b7aff" opacity=".3"/>
    <circle cx="450" cy="650" r=".7" fill="#9b7aff" opacity=".4"/>
    <circle cx="200" cy="500" r="1" fill="#9b7aff" opacity=".25"/>
    <circle cx="1400" cy="400" r=".9" fill="#9b7aff" opacity=".35"/>

    <!-- Cyan particles -->
    <circle cx="1280" cy="300" r="1" fill="#5ed4d4" opacity=".4"/>
    <circle cx="420" cy="180" r=".8" fill="#5ed4d4" opacity=".3"/>
    <circle cx="1050" cy="140" r="1.2" fill="#5ed4d4" opacity=".35"/>
    <circle cx="250" cy="750" r=".9" fill="#5ed4d4" opacity=".3"/>
    <circle cx="900" cy="780" r="1" fill="#5ed4d4" opacity=".25"/>
    <circle cx="1450" cy="600" r=".7" fill="#5ed4d4" opacity=".4"/>

    <!-- Pink particles -->
    <circle cx="600" cy="100" r=".9" fill="#ff64c8" opacity=".3"/>
    <circle cx="1200" cy="550" r="1" fill="#ff64c8" opacity=".25"/>
    <circle cx="350" cy="400" r=".7" fill="#ff64c8" opacity=".3"/>
    <circle cx="1000" cy="820" r=".8" fill="#ff64c8" opacity=".2"/>
    <circle cx="150" cy="320" r="1" fill="#ff64c8" opacity=".2"/>

    <!-- Gold particles -->
    <circle cx="700" cy="760" r=".8" fill="#d4a853" opacity=".3"/>
    <circle cx="1300" cy="100" r=".9" fill="#d4a853" opacity=".25"/>
    <circle cx="500" cy="500" r=".6" fill="#d4a853" opacity=".3"/>

    <!-- Green particles -->
    <circle cx="1150" cy="250" r=".7" fill="#5dcc8c" opacity=".25"/>
    <circle cx="380" cy="700" r="1" fill="#5dcc8c" opacity=".2"/>
    <circle cx="850" cy="100" r=".8" fill="#5dcc8c" opacity=".3"/>
  </g>

  <!-- ══ LIGHT STREAKS ══ -->
  <line x1="0" y1="448" x2="1600" y2="448" stroke="url(#glowLine)" stroke-width="1" opacity=".4"/>
  <line x1="0" y1="450" x2="1600" y2="450" stroke="url(#glowLine)" stroke-width=".5" opacity=".2"/>

  <!-- ══ DIAMOND LOGOMARK — HERO ══ -->
  <g id="diamond" transform="translate(800,340)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="120" fill="url(#coreGlow)" filter="url(#bigGlow)" opacity=".5"/>

    <!-- Ring 1 — outermost -->
    <rect x="-80" y="-80" width="160" height="160" rx="8" transform="rotate(45)" fill="none" stroke="url(#ringGrad1)" stroke-width="1.5" opacity=".6"/>

    <!-- Ring 2 -->
    <rect x="-56" y="-56" width="112" height="112" rx="6" transform="rotate(45)" fill="none" stroke="url(#ringGrad2)" stroke-width="1.5" opacity=".45"/>

    <!-- Ring 3 -->
    <rect x="-36" y="-36" width="72" height="72" rx="4" transform="rotate(45)" fill="none" stroke="url(#ringGrad3)" stroke-width="1.5" opacity=".3"/>

    <!-- Ring 4 — innermost -->
    <rect x="-20" y="-20" width="40" height="40" rx="3" transform="rotate(45)" fill="none" stroke="#9b7aff" stroke-width="1" opacity=".2"/>

    <!-- Core dot -->
    <circle cx="0" cy="0" r="6" fill="#9b7aff" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity=".8"/>

    <!-- Corner accent dots on outer ring -->
    <circle cx="0" cy="-113" r="2" fill="#9b7aff" opacity=".5" filter="url(#tinyGlow)"/>
    <circle cx="113" cy="0" r="2" fill="#ff64c8" opacity=".4" filter="url(#tinyGlow)"/>
    <circle cx="0" cy="113" r="2" fill="#5ed4d4" opacity=".4" filter="url(#tinyGlow)"/>
    <circle cx="-113" cy="0" r="2" fill="#d4a853" opacity=".3" filter="url(#tinyGlow)"/>
  </g>

  <!-- ══ TYPOGRAPHY ══ -->

  <!-- D.AI -->
  <text x="800" y="540" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="72" fill="#f0ece4" letter-spacing="6" font-weight="400">D<tspan fill="#9b7aff">.</tspan><tspan font-style="italic" fill="url(#accentGrad)">AI</tspan></text>

  <!-- Tagline -->
  <text x="800" y="585" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" fill="#808080" font-style="italic" letter-spacing="1">The AI That Becomes You.</text>

  <!-- Divider line -->
  <line x1="720" y1="610" x2="880" y2="610" stroke="#1a1a22" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="800" y="645" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#5a5a5a" letter-spacing="4">ADAPTIVE AI INTERFACE · PRODUCT DESIGN CASE STUDY</text>

  <!-- Persona color dots -->
  <g transform="translate(800,685)">
    <circle cx="-75" cy="0" r="4" fill="#5ed4d4" opacity=".7" filter="url(#tinyGlow)"/>
    <circle cx="-45" cy="0" r="4" fill="#e080c0" opacity=".7" filter="url(#tinyGlow)"/>
    <circle cx="-15" cy="0" r="4" fill="#d4a853" opacity=".7" filter="url(#tinyGlow)"/>
    <circle cx="15" cy="0" r="4" fill="#5dcc8c" opacity=".7" filter="url(#tinyGlow)"/>
    <circle cx="45" cy="0" r="4" fill="#5e8ed4" opacity=".7" filter="url(#tinyGlow)"/>
    <circle cx="75" cy="0" r="4" fill="#a080dd" opacity=".7" filter="url(#tinyGlow)"/>
  </g>

  <!-- Profession labels under dots -->
  <g transform="translate(800,705)" font-family="'JetBrains Mono', monospace" font-size="7" fill="#3a3a3a" letter-spacing="1">
    <text x="-75" y="0" text-anchor="middle">ENG</text>
    <text x="-45" y="0" text-anchor="middle">DES</text>
    <text x="-15" y="0" text-anchor="middle">LAW</text>
    <text x="15" y="0" text-anchor="middle">MED</text>
    <text x="45" y="0" text-anchor="middle">FIN</text>
    <text x="75" y="0" text-anchor="middle">EDU</text>
  </g>

  <!-- ══ AUTHOR ══ -->
  <text x="800" y="830" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#3a3a3a" letter-spacing="1">Designed by Dheeraj Allu</text>
  <text x="800" y="852" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#282830" letter-spacing="2">dheerajallu.art</text>

  <!-- ══ CORNER ACCENTS ══ -->
  <!-- Top-left -->
  <line x1="40" y1="40" x2="40" y2="80" stroke="#1a1a22" stroke-width="1"/>
  <line x1="40" y1="40" x2="80" y2="40" stroke="#1a1a22" stroke-width="1"/>

  <!-- Top-right -->
  <line x1="1560" y1="40" x2="1560" y2="80" stroke="#1a1a22" stroke-width="1"/>
  <line x1="1560" y1="40" x2="1520" y2="40" stroke="#1a1a22" stroke-width="1"/>

  <!-- Bottom-left -->
  <line x1="40" y1="860" x2="40" y2="820" stroke="#1a1a22" stroke-width="1"/>
  <line x1="40" y1="860" x2="80" y2="860" stroke="#1a1a22" stroke-width="1"/>

  <!-- Bottom-right -->
  <line x1="1560" y1="860" x2="1560" y2="820" stroke="#1a1a22" stroke-width="1"/>
  <line x1="1560" y1="860" x2="1520" y2="860" stroke="#1a1a22" stroke-width="1"/>
</svg>
