<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080a11"/>
      <stop offset="100%" stop-color="#04050a"/>
    </linearGradient>
    <linearGradient id="acG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86b7ff"/>
      <stop offset="50%" stop-color="#7ee7d4"/>
      <stop offset="100%" stop-color="#b39cff"/>
    </linearGradient>
    <linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#86b7ff" stop-opacity=".22"/>
      <stop offset="50%" stop-color="#7ee7d4" stop-opacity=".36"/>
      <stop offset="70%" stop-color="#b39cff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86b7ff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#86b7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ee7d4" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#7ee7d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b39cff" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#b39cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bGlow"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgG)"/>

  <ellipse cx="760" cy="320" rx="560" ry="330" fill="url(#glow1)"/>
  <ellipse cx="1030" cy="430" rx="420" ry="280" fill="url(#glow2)"/>
  <ellipse cx="560" cy="520" rx="360" ry="240" fill="url(#glow3)"/>

  <!-- grid -->
  <g opacity=".04" stroke="#ffffff" stroke-width=".5">
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>

  <!-- particles -->
  <g opacity=".48">
    <circle cx="220" cy="120" r="1" fill="#86b7ff" opacity=".45"/>
    <circle cx="410" cy="260" r=".8" fill="#7ee7d4" opacity=".32"/>
    <circle cx="1310" cy="160" r="1" fill="#b39cff" opacity=".35"/>
    <circle cx="1120" cy="730" r="1.1" fill="#86b7ff" opacity=".28"/>
    <circle cx="470" cy="670" r=".8" fill="#7ee7d4" opacity=".30"/>
    <circle cx="1440" cy="620" r=".8" fill="#b39cff" opacity=".25"/>
    <circle cx="290" cy="740" r=".9" fill="#86b7ff" opacity=".26"/>
    <circle cx="970" cy="130" r="1" fill="#7ee7d4" opacity=".30"/>
    <circle cx="710" cy="790" r=".9" fill="#b39cff" opacity=".22"/>
    <circle cx="1360" cy="380" r=".7" fill="#7ee7d4" opacity=".28"/>
    <circle cx="170" cy="500" r=".9" fill="#86b7ff" opacity=".24"/>
    <circle cx="1210" cy="250" r=".8" fill="#b39cff" opacity=".26"/>
  </g>

  <line x1="0" y1="448" x2="1600" y2="448" stroke="url(#lineG)" stroke-width="1" opacity=".4"/>

  <!-- abstract stack icon -->
  <g transform="translate(800,285)">
    <ellipse cx="0" cy="0" rx="140" ry="90" fill="#86b7ff" opacity=".08" filter="url(#bGlow)"/>

    <rect x="-165" y="-92" width="330" height="36" rx="18" fill="none" stroke="#86b7ff" stroke-width="1.2" opacity=".55"/>
    <rect x="-130" y="-34" width="260" height="34" rx="17" fill="none" stroke="#7ee7d4" stroke-width="1.2" opacity=".5"/>
    <rect x="-94" y="20" width="188" height="32" rx="16" fill="none" stroke="#b39cff" stroke-width="1.2" opacity=".48"/>

    <line x1="0" y1="-56" x2="0" y2="-34" stroke="#7ee7d4" stroke-width="1" opacity=".45"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#b39cff" stroke-width="1" opacity=".4"/>

    <circle cx="-110" cy="-74" r="4" fill="#86b7ff" opacity=".72" filter="url(#sGlow)"/>
    <circle cx="0" cy="-17" r="4" fill="#7ee7d4" opacity=".72" filter="url(#sGlow)"/>
    <circle cx="74" cy="36" r="4" fill="#b39cff" opacity=".72" filter="url(#sGlow)"/>

    <g opacity=".35" stroke-width="1" filter="url(#sGlow)">
      <line x1="-165" y1="-74" x2="165" y2="-74" stroke="#86b7ff"/>
      <line x1="-130" y1="-17" x2="130" y2="-17" stroke="#7ee7d4"/>
      <line x1="-94" y1="36" x2="94" y2="36" stroke="#b39cff"/>
    </g>
  </g>

  <!-- typography -->
  <text x="800" y="470" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="66" fill="#f1ede5" letter-spacing="4" font-weight="400">Enterprise <tspan fill="url(#acG)">Tech</tspan></text>
  <text x="800" y="530" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="58" fill="#f1ede5" letter-spacing="4" font-weight="400">Landscape</text>

  <text x="800" y="575" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" fill="#808893" font-style="italic" letter-spacing="1">How companies build, run, and sell software.</text>

  <line x1="700" y1="605" x2="900" y2="605" stroke="#1c2430" stroke-width="1"/>

  <text x="800" y="640" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#5a6270" letter-spacing="4">ENTERPRISE UX RESEARCH · SYSTEMS THINKING · CASE STUDY</text>

  <!-- pills -->
  <g transform="translate(800,688)" font-family="'DM Sans', sans-serif" font-size="11">
    <rect x="-250" y="-14" width="78" height="28" rx="14" fill="none" stroke="#1d2430" stroke-width="1"/>
    <text x="-211" y="4" text-anchor="middle" fill="#6f7783">SaaS</text>

    <rect x="-160" y="-14" width="88" height="28" rx="14" fill="none" stroke="#1d2430" stroke-width="1"/>
    <text x="-116" y="4" text-anchor="middle" fill="#6f7783">ERP / CRM</text>

    <rect x="-60" y="-14" width="108" height="28" rx="14" fill="none" stroke="#1d2430" stroke-width="1"/>
    <text x="-6" y="4" text-anchor="middle" fill="#6f7783">Microservices</text>

    <rect x="60" y="-14" width="112" height="28" rx="14" fill="none" stroke="#1d2430" stroke-width="1"/>
    <text x="116" y="4" text-anchor="middle" fill="#6f7783">Observability</text>

    <rect x="184" y="-14" width="66" height="28" rx="14" fill="none" stroke="#1d2430" stroke-width="1"/>
    <text x="217" y="4" text-anchor="middle" fill="#6f7783">AIOps</text>
  </g>

  <g transform="translate(800,750)">
    <circle cx="-30" cy="0" r="4" fill="#86b7ff" opacity=".65" filter="url(#sGlow)"/>
    <circle cx="0" cy="0" r="4" fill="#7ee7d4" opacity=".65" filter="url(#sGlow)"/>
    <circle cx="30" cy="0" r="4" fill="#b39cff" opacity=".65" filter="url(#sGlow)"/>
  </g>

  <text x="800" y="820" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#3b4350" letter-spacing="1">Designed by Dheeraj Allu</text>
  <text x="800" y="842" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a313b" letter-spacing="2">dheerajallu.art</text>

  <!-- corner accents -->
  <line x1="40" y1="40" x2="40" y2="80" stroke="#1c2430" stroke-width="1"/>
  <line x1="40" y1="40" x2="80" y2="40" stroke="#1c2430" stroke-width="1"/>
  <line x1="1560" y1="40" x2="1560" y2="80" stroke="#1c2430" stroke-width="1"/>
  <line x1="1560" y1="40" x2="1520" y2="40" stroke="#1c2430" stroke-width="1"/>
  <line x1="40" y1="860" x2="40" y2="820" stroke="#1c2430" stroke-width="1"/>
  <line x1="40" y1="860" x2="80" y2="860" stroke="#1c2430" stroke-width="1"/>
  <line x1="1560" y1="860" x2="1560" y2="820" stroke="#1c2430" stroke-width="1"/>
  <line x1="1560" y1="860" x2="1520" y2="860" stroke="#1c2430" stroke-width="1"/>
</svg>
